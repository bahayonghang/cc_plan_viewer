<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Viewer</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  
  <!-- Preconnect to CDN origins -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>

  <!-- Markdown & syntax highlighting (defer: non-blocking, ordered execution) -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/marked-highlight/2.2.2/index.umd.min.js"></script>
  <!-- beautiful-mermaid: lazy-loaded on demand in app.js when mermaid blocks detected -->
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
</head>
<body>
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">
      <img src="/icon.svg" alt="Plan Viewer" width="24" height="24">
      Plan Viewer
    </div>
    <div class="topbar-status">
      <div class="lang-switch" id="langToggle" onclick="toggleLang()" title="切换语言 / Switch Language">
        <span id="langLabel">EN</span>
      </div>
      <div class="theme-switch">
        <span class="theme-switch-label" data-i18n="theme.dark">暗色</span>
        <div class="theme-switch-track" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark theme">
          <div class="theme-switch-thumb" id="themeThumb">
            <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </div>
        </div>
        <span class="theme-switch-label" data-i18n="theme.light">亮色</span>
      </div>
      <span id="statusText" style="font-family: var(--font-sans); font-size: 0.78rem;"></span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header" data-i18n="sidebar.plans">📋 计划列表</div>
      <div id="sourceSwitcher" style="display:none;padding:0 12px 8px;"></div>
      <div id="sourceTabs" class="source-tabs" style="display:none;"></div>
      <div class="plan-list" id="planList">
        <div class="empty-state" style="padding: 20px;">
          <p>Loading plans...</p>
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content-area" id="contentArea">
      <div class="empty-state" id="emptyState">
        <div class="loading-spinner" id="loadingSpinner"></div>
        <p>Loading plans...</p>
      </div>

      <!-- Active plan view (hidden initially) -->
      <div id="planView" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
        <div class="toolbar">
          <span class="toolbar-info" id="planFileName"></span>
          <span class="toolbar-info" id="planModified"></span>
          <div class="toolbar-spacer"></div>
          <select class="preset-selector" id="presetSelector" onchange="setPreset(this.value)" data-i18n-title="styles.presetLabel"></select>
          <button class="toolbar-btn" onclick="refreshCurrentPlan()" data-i18n="toolbar.refresh">⟳ 刷新</button>
        </div>
        <div class="split-view">
          <div class="markdown-pane" id="markdownPane">
            <div class="md-content" id="mdContent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SELECTION TOOLTIP -->
  <div class="selection-tooltip" id="selectionTooltip" data-i18n="comments.selectionTooltip">💬 评论选中文字</div>

  <!-- SSH TAB CONTEXT MENU -->
  <div class="context-menu" id="sshContextMenu" style="display:none;">
    <button class="context-menu-item" data-action="edit" data-i18n="ssh.editConfig">✏️ 编辑配置</button>
    <button class="context-menu-item" data-action="disconnect" data-i18n="ssh.disconnect">🔌 断开连接</button>
    <div class="context-menu-divider"></div>
    <button class="context-menu-item danger" data-action="delete" data-i18n="ssh.delete">🗑️ 删除</button>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- SSH CONFIG MODAL -->
  <div class="modal-overlay" id="sshModal" style="display:none;" onclick="closeSshModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="sshModalTitle">添加 SSH 连接</h3>
        <button class="modal-close" onclick="closeSshModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="sshConfigId" value="">
        <div class="form-group">
          <label data-i18n="ssh.displayName">显示名称</label>
          <input type="text" id="sshName" placeholder="My Server">
        </div>
        <div class="form-group">
          <label data-i18n="ssh.host">主机</label>
          <input type="text" id="sshHost" placeholder="192.168.1.100 / example.com">
        </div>
        <div class="form-group form-row">
          <div class="form-group" style="flex:1">
            <label data-i18n="ssh.username">用户名</label>
            <input type="text" id="sshUsername" placeholder="root">
          </div>
          <div class="form-group" style="width:100px">
            <label data-i18n="ssh.port">端口</label>
            <input type="number" id="sshPort" value="22" min="1" max="65535">
          </div>
        </div>
        <div class="form-group">
          <label data-i18n="ssh.authMethod">认证方式</label>
          <select id="sshAuthMethod" onchange="toggleAuthFields()">
            <option value="Key" data-i18n="ssh.keyFile">密钥文件</option>
            <option value="Password" data-i18n="ssh.password">密码</option>
          </select>
        </div>
        <div class="form-group" id="sshKeyGroup">
          <label data-i18n="ssh.privateKeyPath">私钥路径</label>
          <input type="text" id="sshKeyPath" placeholder="C:\Users\you\.ssh\id_rsa">
        </div>
        <div class="form-group" id="sshPassphraseGroup">
          <label data-i18n="ssh.keyPassphrase">密钥密码 (可选)</label>
          <input type="password" id="sshPassphrase">
        </div>
        <div class="form-group" id="sshPasswordGroup" style="display:none">
          <label data-i18n="ssh.password">密码</label>
          <input type="password" id="sshPassword">
        </div>
        <div class="form-group">
          <label data-i18n="ssh.remoteClaude">远程 .claude 目录</label>
          <input type="text" id="sshRemoteDir" value="~/.claude" placeholder="~/.claude">
        </div>
        <div class="ssh-test-result" id="sshTestResult" style="display:none"></div>
      </div>
      <div class="modal-footer">
        <button class="toolbar-btn" id="sshTestBtn" onclick="testSshConnection()" data-i18n="ssh.testConnection">🔌 测试连接</button>
        <div class="toolbar-spacer"></div>
        <button class="toolbar-btn" onclick="closeSshModal()" data-i18n="ssh.cancel">取消</button>
        <button class="toolbar-btn primary" onclick="saveSshConfig()" data-i18n="ssh.save">保存</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
